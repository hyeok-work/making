<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>카드뉴스 메이커 v2</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
:root {
  --bg-dark:#111; --panel:#181818; --input-bg:#1e1e1e; --border:#2a2a2a;
  --card-bg:#0a1628; --point:#5FC4D9; --txt-main:#ffffff; --txt-sub:#9aa0a6;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg-dark);color:#fff;font-family:'Pretendard','Apple SD Gothic Neo',sans-serif;display:flex;height:100vh;overflow:hidden;}

/* ── 에디터 패널 ── */
.editor{width:400px;min-width:400px;padding:20px;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;gap:10px;overflow-y:auto;}
.editor h2{font-size:21px;font-weight:800;letter-spacing:-.03em;padding-bottom:10px;border-bottom:1px solid var(--border);}
.section-label{font-size:14px;color:#666;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-top:4px;}
label{font-size:15px;color:#888;font-weight:600;}
input[type=text],textarea{width:100%;background:var(--input-bg);border:1px solid var(--border);color:#fff;padding:8px 10px;border-radius:6px;font-size:17px;outline:none;font-family:inherit;resize:vertical;}
input[type=text]:focus,textarea:focus{border-color:var(--point);}
.color-row{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.color-item{display:flex;flex-direction:column;gap:3px;}
input[type=color]{width:100%;height:30px;padding:2px;cursor:pointer;border:1px solid var(--border);border-radius:4px;background:var(--input-bg);}
.layout-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;}
.tmpl-btn{background:#1e1e1e;border:1px solid var(--border);color:#aaa;padding:9px 6px;border-radius:6px;cursor:pointer;font-size:15px;text-align:center;font-weight:700;transition:all .15s;}
.tmpl-btn:hover{border-color:#666;color:#fff;}
.tmpl-btn.active{border-color:var(--point);color:var(--point);background:#111;}
.slider-row{display:flex;align-items:center;gap:8px;}
.slider-row input[type=range]{flex:1;accent-color:var(--point);}
.slider-val{font-size:15px;color:var(--txt-sub);min-width:28px;text-align:right;}
.toggle-row{display:flex;align-items:center;gap:8px;}
.toggle-row label{flex:1;font-size:17px;color:#ccc;}
.toggle{position:relative;width:36px;height:20px;flex-shrink:0;}
.toggle input{opacity:0;width:0;height:0;}
.toggle-slider{position:absolute;inset:0;background:#333;border-radius:20px;cursor:pointer;transition:.2s;}
.toggle-slider:before{content:'';position:absolute;width:14px;height:14px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s;}
.toggle input:checked+.toggle-slider{background:var(--point);}
.toggle input:checked+.toggle-slider:before{transform:translateX(16px);}
.dyn-inputs{display:flex;flex-direction:column;gap:8px;}
.list-item-row{display:flex;gap:6px;align-items:center;}
.list-item-row input{flex:1;}
.item-num{font-size:15px;color:var(--point);font-weight:800;min-width:22px;}
.align-btns{display:flex;gap:4px;}
.align-btn{flex:1;background:#1e1e1e;border:1px solid var(--border);color:#aaa;padding:6px;border-radius:5px;cursor:pointer;font-size:17px;transition:all .15s;}
.align-btn:hover{border-color:#666;color:#fff;}
.align-btn.active{border-color:var(--point);color:var(--point);background:#111;}
.save-btn{background:var(--point);color:#fff;border:none;padding:14px;border-radius:8px;font-weight:800;cursor:pointer;font-size:14px;margin-top:4px;width:100%;letter-spacing:-.02em;}
.save-btn:hover{opacity:.9;}

/* ── 미리보기 ── */
.preview{flex:1;display:flex;justify-content:center;align-items:center;background:#0a0a0a;padding:20px;overflow:hidden;}
#card-viewport{position:relative;flex-shrink:0;}

/* ── 카드 (실제 출력 크기: 1080×1350) ── */
#card{
  width:1080px;height:1350px;
  background:var(--card-bg);
  padding:117px 108px;
  display:flex;flex-direction:column;
  box-sizing:border-box;position:relative;overflow:hidden;
  transition:background .2s;
  transform-origin:top left;
}
.card-bg-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:1;}
.card-overlay{position:absolute;inset:0;z-index:2;}
.card-inner{position:relative;z-index:5;flex:1;display:flex;flex-direction:column;}

/* 공통 요소 */
.c-tag{align-self:flex-start;background:rgba(127,127,127,.12);color:var(--txt-main);padding:16px 32px;border-radius:113px;font-size:29px;font-weight:700;border:1px solid rgba(127,127,127,.2);margin-bottom:54px;}
.c-title{font-weight:900;line-height:1.22;letter-spacing:-.06em;color:var(--txt-main);word-break:keep-all;overflow-wrap:break-word;margin-bottom:32px;}
.c-desc{line-height:1.65;color:var(--txt-sub);white-space:pre-wrap;word-break:keep-all;overflow-wrap:break-word;}
.c-footer{margin-top:auto;display:flex;justify-content:space-between;align-items:center;border-top:1px solid rgba(127,127,127,.18);padding-top:45px;}
.c-logo{font-size:25px;color:var(--txt-sub);font-weight:700;opacity:.55;}
.c-dots{font-size:23px;color:var(--txt-sub);opacity:.4;letter-spacing:7px;}

/* COVER */
.lay-cover{flex:1;display:flex;flex-direction:column;justify-content:flex-end;}

/* QUOTE */
.lay-quote{flex:1;display:flex;flex-direction:column;justify-content:center;}
.q-mark{font-size:225px;font-weight:900;color:var(--point);line-height:.7;font-family:Georgia,serif;margin-bottom:18px;}
.q-text{font-weight:800;line-height:1.38;color:var(--txt-main);letter-spacing:-.04em;word-break:keep-all;padding-left:45px;border-left:7px solid var(--point);}
.q-source{margin-top:36px;padding-left:45px;font-size:32px;color:var(--txt-sub);}

/* LIST */
.lay-list{flex:1;display:flex;flex-direction:column;justify-content:center;gap:27px;}
.l-card{background:rgba(127,127,127,.09);border:1px solid rgba(127,127,127,.1);padding:34px 36px;border-radius:23px;display:flex;gap:32px;align-items:center;}
.l-num{font-size:45px;font-weight:900;color:var(--point);min-width:59px;}
.l-body{line-height:1.38;color:var(--txt-main);}
.l-body b{display:block;margin-bottom:7px;}

/* CHECKLIST */
.lay-checklist{flex:1;display:flex;flex-direction:column;justify-content:center;gap:18px;}
.cl-section-title{font-weight:800;letter-spacing:-.04em;color:var(--txt-main);margin-bottom:14px;word-break:keep-all;}
.cl-item{display:flex;gap:32px;align-items:center;padding:25px 32px;border-radius:23px;background:rgba(127,127,127,.08);border:1px solid rgba(127,127,127,.1);}
.cl-icon{width:50px;height:50px;border-radius:50%;border:4px solid rgba(127,127,127,.35);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:25px;font-weight:900;}
.cl-icon.done{background:var(--point);border-color:var(--point);color:#fff;}
.cl-text{line-height:1.4;color:var(--txt-main);word-break:keep-all;}
.cl-text.done-text{color:var(--txt-sub);text-decoration:line-through;opacity:.6;}

/* SPLIT */
.lay-split{}
.split-img-box{border-radius:23px;overflow:hidden;margin-bottom:41px;border:1px solid rgba(127,127,127,.15);}
.split-img-placeholder{background:rgba(127,127,127,.12);display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.2);font-size:27px;}

/* QNA */
.lay-qna{flex:1;display:flex;flex-direction:column;justify-content:center;gap:45px;}
.qna-q{display:flex;gap:32px;align-items:flex-start;}
.qna-badge{font-size:41px;font-weight:900;color:var(--point);min-width:59px;line-height:1.3;}
.qna-q-text{font-weight:800;line-height:1.38;color:var(--txt-main);word-break:keep-all;}
.qna-divider{height:2px;background:rgba(127,127,127,.2);}
.qna-a{display:flex;gap:32px;align-items:flex-start;}
.qna-a-badge{font-size:41px;font-weight:900;color:var(--txt-sub);min-width:59px;line-height:1.3;}
.qna-a-text{line-height:1.6;color:var(--txt-sub);word-break:keep-all;}

/* STAT */
.lay-stat{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;}
.stat-num{font-weight:900;line-height:1;letter-spacing:-.05em;color:var(--point);margin-bottom:27px;}
.stat-unit{font-size:50px;font-weight:700;color:var(--point);vertical-align:super;margin-left:9px;}
.stat-label{font-size:41px;font-weight:700;color:var(--txt-main);margin-bottom:23px;word-break:keep-all;}
.stat-desc{font-size:32px;line-height:1.6;color:var(--txt-sub);word-break:keep-all;}

/* TIMELINE */
.lay-timeline{flex:1;display:flex;flex-direction:column;justify-content:center;position:relative;padding-left:18px;}
.tl-line{position:absolute;left:63px;top:0;bottom:0;width:5px;background:rgba(127,127,127,.2);z-index:0;}
.tl-item{display:flex;gap:36px;align-items:flex-start;position:relative;z-index:1;padding:18px 0;}
.tl-dot-wrap{display:flex;flex-direction:column;align-items:center;min-width:45px;padding-top:7px;}
.tl-dot{width:27px;height:27px;border-radius:50%;background:var(--point);border:5px solid var(--card-bg);flex-shrink:0;}
.tl-dot.first{width:36px;height:36px;box-shadow:0 0 0 7px rgba(52,168,83,.25);}
.tl-body{}
.tl-year{font-size:27px;font-weight:800;color:var(--point);margin-bottom:7px;letter-spacing:.02em;}
.tl-title{font-weight:700;line-height:1.35;color:var(--txt-main);word-break:keep-all;}
.tl-desc{font-size:27px;line-height:1.5;color:var(--txt-sub);margin-top:7px;word-break:keep-all;}

/* BEFORE & AFTER */
.lay-ba{flex:1;display:flex;flex-direction:column;justify-content:center;gap:32px;}
.ba-title{font-weight:900;line-height:1.22;letter-spacing:-.05em;color:var(--txt-main);word-break:keep-all;margin-bottom:14px;}
.ba-panel{border-radius:27px;padding:45px 50px;display:flex;flex-direction:column;gap:16px;}
.ba-panel.before{background:rgba(127,127,127,.1);border:2px solid rgba(127,127,127,.18);}
.ba-panel.after{background:var(--point);border:2px solid var(--point);}
.ba-label{font-size:27px;font-weight:900;letter-spacing:.12em;text-transform:uppercase;opacity:.7;}
.ba-panel.before .ba-label{color:var(--txt-sub);}
.ba-panel.after .ba-label{color:rgba(0,0,0,.5);}
.ba-val{font-weight:900;line-height:1;letter-spacing:-.04em;word-break:keep-all;}
.ba-panel.before .ba-val{color:var(--txt-main);}
.ba-panel.after .ba-val{color:#fff;}
.ba-desc{line-height:1.5;word-break:keep-all;}
.ba-panel.before .ba-desc{color:var(--txt-sub);}
.ba-panel.after .ba-desc{color:rgba(255,255,255,.8);}
.ba-arrow{text-align:center;font-size:54px;color:var(--point);line-height:1;margin:-8px 0;}

/* 슬라이드 스트립 */
.slide-strip{padding:14px 0 12px;border-bottom:1px solid var(--border);margin-bottom:6px;overflow:visible;}
.slide-thumbs{display:flex;flex-wrap:wrap;gap:10px;}
.slide-thumb{flex-shrink:0;width:80px;height:100px;border-radius:10px;background:#1e1e1e;border:2px solid var(--border);cursor:pointer;font-size:12px;font-weight:800;color:#555;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;transition:all .15s;position:relative;}
.slide-thumb:hover{border-color:#666;color:#ccc;background:#252525;}
.slide-thumb.active{border-color:var(--point);color:var(--point);background:#111;}
.slide-thumb .th-icon{font-size:28px;line-height:1;}
.slide-thumb .th-num{font-size:12px;font-weight:700;opacity:.7;}
.slide-thumb .del-btn{position:absolute;top:-7px;right:-7px;width:20px;height:20px;background:#c00;border-radius:50%;font-size:12px;color:#fff;display:none;align-items:center;justify-content:center;cursor:pointer;border:none;padding:0;line-height:1;}
.slide-thumb:hover .del-btn{display:flex;}
.slide-add{flex-shrink:0;width:80px;height:100px;border-radius:10px;background:none;border:2px dashed #333;color:#555;font-size:30px;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;}
.slide-add:hover{border-color:var(--point);color:var(--point);background:#111;}
.zip-btn{background:#0FB297;color:#fff;border:none;padding:14px;border-radius:8px;font-weight:800;cursor:pointer;font-size:13px;margin-top:4px;width:100%;letter-spacing:-.02em;}
.zip-btn:hover{opacity:.9;}
.zip-btn:disabled{opacity:.5;cursor:not-allowed;}

/* 이모지 피커 */
.emoji-btn{background:none;border:1px solid var(--border);border-radius:4px;cursor:pointer;font-size:14px;padding:3px 7px;color:#888;transition:all .15s;flex-shrink:0;}
.emoji-btn:hover{border-color:#666;background:#222;}
.emoji-picker{position:fixed;z-index:9999;background:#1e1e1e;border:1px solid #444;border-radius:10px;padding:12px;width:300px;box-shadow:0 8px 32px rgba(0,0,0,.7);display:none;overflow:hidden;}
.emoji-picker.show{display:block;}
.emoji-cats{display:flex;gap:4px;margin-bottom:10px;flex-wrap:wrap;}
.emoji-cat-btn{background:none;border:1px solid #333;border-radius:4px;padding:4px 9px;color:#888;cursor:pointer;font-size:10px;font-weight:700;}
.emoji-cat-btn.active,.emoji-cat-btn:hover{border-color:var(--point);color:var(--point);}
.emoji-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:2px;max-height:160px;overflow-y:auto;scrollbar-width:thin;}
.emoji-grid::-webkit-scrollbar{width:3px;}
.emoji-grid::-webkit-scrollbar-thumb{background:#444;border-radius:2px;}
.emoji-item{background:none;border:none;font-size:22px;padding:5px 2px;border-radius:4px;cursor:pointer;text-align:center;line-height:1;width:100%;}
.emoji-item:hover{background:#333;}
</style>
</head>
<body>

<div class="editor">
  <h2>카드뉴스 메이커 v1.1 <span id="save-indicator" style="font-size:10px;color:#555;font-weight:400;margin-left:6px;"></span></h2>
  <div class="slide-strip" id="slide-strip">
    <div class="slide-thumbs" id="slide-thumbs"></div>
    <button class="slide-add" onclick="addCard()" title="카드 추가">+</button>
  </div>

  <div class="section-label">색상</div>
  <div class="color-row">
    <div class="color-item"><label>배경</label><input type="color" id="c-bg" value="#0a1628" oninput="applyColors()"></div>
    <div class="color-item"><label>포인트</label><input type="color" id="c-pt" value="#5FC4D9" oninput="applyColors()"></div>
    <div class="color-item"><label>메인 글자</label><input type="color" id="c-tm" value="#ffffff" oninput="applyColors()"></div>
    <div class="color-item"><label>서브 글자</label><input type="color" id="c-ts" value="#9aa0a6" oninput="applyColors()"></div>
    <div class="color-item"><label>태그 글자</label><input type="color" id="c-tag" value="#ffffff" oninput="renderCard()"></div>
    <div class="color-item"><label>태그 배경</label><input type="color" id="c-tag-bg" value="#5FC4D9" oninput="renderCard()"></div>
  </div>

  <div class="section-label">배경 사진</div>
  <input type="file" accept="image/*" onchange="loadPhoto(this)" style="color:#aaa;font-size:12px;">
  <div id="photo-controls" style="display:none;flex-direction:column;gap:6px;">
    <div class="slider-row">
      <label>어둡기</label>
      <input type="range" id="overlay-opacity" min="0" max="90" value="60" oninput="renderCard()">
      <span class="slider-val" id="overlay-val">60%</span>
    </div>
    <div class="slider-row">
      <label>블러</label>
      <input type="range" id="blur-range" min="0" max="40" value="0" oninput="renderCard()">
      <span class="slider-val" id="blur-val">0px</span>
    </div>
    <label>사진 맞춤</label>
    <div class="align-btns" id="bg-fit-btns">
      <button class="align-btn active" onclick="setBgFit('cover',this)">꽉 채움</button>
      <button class="align-btn" onclick="setBgFit('contain',this)">전체 보기</button>
      <button class="align-btn" onclick="setBgFit('fill',this)">늘리기</button>
    </div>
    <button onclick="clearPhoto()" style="background:#1e1e1e;border:1px solid #333;color:#999;padding:6px;border-radius:5px;cursor:pointer;font-size:11px;">사진 제거</button>
  </div>

  <div class="section-label">로고 (PNG 권장)</div>
  <input type="file" accept="image/*" onchange="loadLogo(this)" style="color:#aaa;font-size:12px;">
  <div id="logo-controls" style="display:none;flex-direction:column;gap:6px;">
    <label>위치</label>
    <div class="align-btns" id="logo-pos-btns">
      <button class="align-btn active" onclick="setLogoPos('footer-left',this)">푸터 좌</button>
      <button class="align-btn" onclick="setLogoPos('footer-right',this)">푸터 우</button>
      <button class="align-btn" onclick="setLogoPos('top-right',this)">우상단</button>
    </div>
    <div class="slider-row">
      <label>크기</label>
      <input type="range" id="logo-size" min="45" max="225" value="90" oninput="renderCard()">
      <span class="slider-val" id="logo-size-val">90px</span>
    </div>
    <div class="slider-row">
      <label>투명도</label>
      <input type="range" id="logo-opacity" min="10" max="100" value="80" oninput="renderCard()">
      <span class="slider-val" id="logo-op-val">80%</span>
    </div>
    <button onclick="clearLogo()" style="background:#1e1e1e;border:1px solid #333;color:#999;padding:6px;border-radius:5px;cursor:pointer;font-size:11px;">로고 제거</button>
  </div>

  <div class="section-label">레이아웃</div>
  <div class="layout-grid">
    <div class="tmpl-btn active" onclick="setLayout('cover',this)">📌 표지/종료</div>
    <div class="tmpl-btn" onclick="setLayout('quote',this)">💬 인용문</div>
    <div class="tmpl-btn" onclick="setLayout('list',this)">📋 리스트</div>
    <div class="tmpl-btn" onclick="setLayout('checklist',this)">✅ 체크리스트</div>
    <div class="tmpl-btn" onclick="setLayout('split',this)">🖼 사진+텍스트</div>
    <div class="tmpl-btn" onclick="setLayout('qna',this)">❓ Q&A</div>
    <div class="tmpl-btn" onclick="setLayout('stat',this)">📊 숫자 강조</div>
    <div class="tmpl-btn" onclick="setLayout('timeline',this)">🕐 타임라인</div>
    <div class="tmpl-btn" onclick="setLayout('beforeafter',this)">↔ 비포&에프터</div>
  </div>

  <div class="section-label">공통</div>
  <div style="display:flex;flex-direction:column;gap:6px;">
    <label>상단 태그</label>
    <div style="display:flex;gap:5px;align-items:center;">
      <input type="text" id="in-tag" value="🌱 공공상생연대기금" oninput="renderCard(); saveState()" style="flex:1;">
      <button class="emoji-btn" onclick="toggleEmoji(event,'in-tag')">😊</button>
    </div>
    <label>하단 텍스트 로고</label>
    <input type="text" id="in-footer-text" value="공공상생연대기금" oninput="renderCard(); saveState()">
  </div>

  <div id="ctrl-align" style="display:none;flex-direction:column;gap:6px;">
    <label>텍스트 정렬</label>
    <div class="align-btns" id="align-btns">
      <button class="align-btn active" onclick="setAlign('left',this)">◀ 좌측</button>
      <button class="align-btn" onclick="setAlign('center',this)">● 중앙</button>
    </div>
  </div>

  <div class="section-label" style="display:flex;justify-content:space-between;align-items:center;">
    내용
    <button class="emoji-btn" onclick="toggleEmoji(event,null)" style="font-size:12px;">😊 이모지</button>
  </div>
  <div style="font-size:10px;color:#444;line-height:1.6;padding:4px 6px;background:#161616;border-radius:4px;border:1px solid #2a2a2a;">
    <span style="color:var(--point);font-weight:700;">**단어**</span> 포인트색 강조 &nbsp;·&nbsp; <span style="background:var(--point);color:#111;padding:0 3px;border-radius:2px;font-weight:700;font-size:9px;">==단어==</span> 하이라이트
  </div>
  <div id="dyn" class="dyn-inputs"></div>

  <div class="section-label">타이틀 크기</div>
  <div class="slider-row">
    <input type="range" id="font-size" min="45" max="135" value="85" oninput="renderCard()">
    <span class="slider-val" id="fs-val">85px</span>
  </div>

  <div id="ctrl-cover-pos" style="display:none;flex-direction:column;gap:6px;">
    <div class="section-label">타이틀 위치</div>
    <div class="slider-row">
      <label>위 ↕ 아래</label>
      <input type="range" id="cover-pos" min="0" max="100" value="100" oninput="renderCard()">
      <span class="slider-val" id="cover-pos-val">아래</span>
    </div>
  </div>

  <button class="save-btn" onclick="saveImage()">💾 PNG 저장 (현재 카드)</button>
  <button class="zip-btn" id="zip-btn" onclick="saveZip()">📦 전체 ZIP 저장 (<span id="zip-card-count">1</span>장)</button>
</div>

<div class="preview">
  <div id="card-viewport">
    <div id="card">
      <img id="card-bg" class="card-bg-img" style="display:none;">
      <div id="card-overlay" class="card-overlay" style="display:none;"></div>
      <div class="card-inner">
        <div id="card-tag" class="c-tag">💡 카드뉴스</div>
        <div id="card-body" style="flex:1;display:flex;flex-direction:column;"></div>
        <div class="c-footer">
          <div id="footer-logo-left" style="display:none;"><img id="logo-footer-left-img" style="height:90px;object-fit:contain;"></div>
          <div class="c-logo" id="footer-text-logo">MY ORGANIZATION</div>
          <div style="display:flex;align-items:center;gap:27px;">
            <div id="footer-logo-right" style="display:none;"><img id="logo-footer-right-img" style="height:90px;object-fit:contain;"></div>
            <div class="c-dots">● ● ●</div>
          </div>
        </div>
      </div>
      <div id="logo-topright" style="display:none;position:absolute;top:54px;right:54px;z-index:10;">
        <img id="logo-topright-img" style="height:90px;object-fit:contain;">
      </div>
    </div>
  </div>
</div>

<script>
let curLayout = 'cover';
let photoData = null;
let splitPhotoData = null;
let logoData = null;
let curAlign = 'left';
let curLogoPos = 'footer-left';
let bgFit = 'cover';
let splitFit = 'cover';

// ── 멀티카드 ──────────────────────────────────
let cards = [];      // 각 카드의 상태 스냅샷 배열
let curCardIdx = 0;

function getCardState() {
  saveDynToMemory();
  return {
    layout: curLayout, align: curAlign,
    fontSize: document.getElementById('font-size').value,
    coverPos: document.getElementById('cover-pos')?.value,
    bgFit, splitFit, logoPos: curLogoPos,
    logoSize: document.getElementById('logo-size')?.value,
    logoOpacity: document.getElementById('logo-opacity')?.value,
    overlayOpacity: document.getElementById('overlay-opacity')?.value,
    blurRange: document.getElementById('blur-range')?.value,
    colors: {
      bg: document.getElementById('c-bg').value,
      pt: document.getElementById('c-pt').value,
      tm: document.getElementById('c-tm').value,
      ts: document.getElementById('c-ts').value,
      tag: document.getElementById('c-tag').value,
      tagBg: document.getElementById('c-tag-bg').value,
    },
    tag: document.getElementById('in-tag').value,
    footerText: document.getElementById('in-footer-text').value,
    layoutContents: JSON.parse(JSON.stringify(layoutContents)),
    photoData: photoData,
    splitPhotoData: splitPhotoData,
    logoData: logoData,
  };
}

function applyCardState(state) {
  if (!state) return;
  // 색상
  document.getElementById('c-bg').value = state.colors?.bg || '#0a1628';
  document.getElementById('c-pt').value = state.colors?.pt || '#5FC4D9';
  document.getElementById('c-tm').value = state.colors?.tm || '#ffffff';
  document.getElementById('c-ts').value = state.colors?.ts || '#9aa0a6';
  document.getElementById('c-tag').value = state.colors?.tag || '#ffffff';
  document.getElementById('c-tag-bg').value = state.colors?.tagBg || '#5FC4D9';
  // CSS 변수 즉시 반영
  const r = document.documentElement;
  r.style.setProperty('--card-bg', state.colors?.bg);
  r.style.setProperty('--point', state.colors?.pt);
  r.style.setProperty('--txt-main', state.colors?.tm);
  r.style.setProperty('--txt-sub', state.colors?.ts);
  document.getElementById('card').style.background = state.colors?.bg;
  // 전역 변수
  curAlign = state.align || 'left';
  bgFit = state.bgFit || 'cover';
  splitFit = state.splitFit || 'cover';
  curLogoPos = state.logoPos || 'footer-left';
  photoData = state.photoData || null;
  splitPhotoData = state.splitPhotoData || null;
  logoData = state.logoData || null;
  // 공통 입력
  document.getElementById('in-tag').value = state.tag || '';
  document.getElementById('in-footer-text').value = state.footerText || '';
  document.getElementById('font-size').value = state.fontSize || 85;
  if (state.coverPos) { const e = document.getElementById('cover-pos'); if (e) e.value = state.coverPos; }
  if (state.overlayOpacity) { const e = document.getElementById('overlay-opacity'); if (e) e.value = state.overlayOpacity; }
  if (state.blurRange) { const e = document.getElementById('blur-range'); if (e) e.value = state.blurRange; }
  if (state.logoSize) { const e = document.getElementById('logo-size'); if (e) e.value = state.logoSize; }
  if (state.logoOpacity) { const e = document.getElementById('logo-opacity'); if (e) e.value = state.logoOpacity; }
  // 사진 컨트롤 표시
  document.getElementById('photo-controls').style.display = photoData ? 'flex' : 'none';
  const bgEl = document.getElementById('card-bg');
  if (photoData) { bgEl.src = photoData; bgEl.style.display = 'block'; } else { bgEl.style.display = 'none'; }
  document.getElementById('logo-controls').style.display = logoData ? 'flex' : 'none';
  // 버튼 active 상태
  ['bg-fit-btns','logo-pos-btns'].forEach(id => document.querySelectorAll(`#${id} .align-btn`).forEach(b => b.classList.remove('active')));
  const bfBtn = document.querySelector(`#bg-fit-btns .align-btn[onclick*="'${bgFit}'"]`);
  if (bfBtn) bfBtn.classList.add('active');
  const lpBtn = document.querySelector(`#logo-pos-btns .align-btn[onclick*="'${curLogoPos}'"]`);
  if (lpBtn) lpBtn.classList.add('active');
  // layoutContents 복원
  Object.keys(layoutContents).forEach(k => delete layoutContents[k]);
  Object.assign(layoutContents, state.layoutContents || {});
  // 레이아웃 세팅
  curLayout = state.layout || 'cover';
  document.querySelectorAll('.tmpl-btn').forEach(b => b.classList.remove('active'));
  const lBtn = document.querySelector(`.tmpl-btn[onclick*="'${curLayout}'"]`);
  if (lBtn) lBtn.classList.add('active');
  const alignShow = ['cover','quote','stat','checklist','beforeafter'].includes(curLayout);
  document.getElementById('ctrl-align').style.display = alignShow ? 'flex' : 'none';
  document.getElementById('ctrl-cover-pos').style.display = curLayout === 'cover' ? 'flex' : 'none';
  document.querySelectorAll('#align-btns .align-btn').forEach(b => b.classList.remove('active'));
  const aBtn = document.querySelector(`#align-btns .align-btn[onclick*="'${curAlign}'"]`);
  if (aBtn) aBtn.classList.add('active');
  buildDynInputs();
  restoreDynFromMemory(curLayout);
  renderCard();
}

const LAYOUT_ICONS = {
  cover:'📌', quote:'💬', list:'📋', checklist:'✅',
  split:'🖼', qna:'❓', stat:'📊', timeline:'🕐', beforeafter:'↔'
};

function updateSlideStrip() {
  const thumbs = document.getElementById('slide-thumbs');
  thumbs.innerHTML = cards.map((c, i) => {
    const icon = LAYOUT_ICONS[c?.layout || 'cover'] || '📌';
    return `<div class="slide-thumb${i===curCardIdx?' active':''}" onclick="switchCard(${i})">
      <span class="th-icon">${icon}</span>
      <span class="th-num">${i+1}</span>
      ${cards.length>1 ? `<button class="del-btn" onclick="event.stopPropagation();deleteCard(${i})">×</button>` : ''}
    </div>`;
  }).join('');
  document.getElementById('zip-card-count').textContent = cards.length;
}

function switchCard(idx) {
  cards[curCardIdx] = getCardState();
  curCardIdx = idx;
  applyCardState(cards[curCardIdx]);
  updateSlideStrip();
  saveState();
}

function addCard() {
  cards[curCardIdx] = getCardState();
  // 새 카드: 현재 색상 유지, 내용만 초기화
  const fresh = getCardState();
  fresh.layoutContents = {};
  fresh.photoData = null;
  fresh.splitPhotoData = null;
  fresh.logoData = null;
  fresh.layout = 'cover';
  fresh.align = 'left';
  cards.push(fresh);
  curCardIdx = cards.length - 1;
  applyCardState(cards[curCardIdx]);
  updateSlideStrip();
  saveState();
}

function deleteCard(idx) {
  if (cards.length === 1) return;
  cards.splice(idx, 1);
  curCardIdx = Math.min(curCardIdx, cards.length - 1);
  applyCardState(cards[curCardIdx]);
  updateSlideStrip();
  saveState();
}

// 레이아웃별 입력 내용을 메모리에 보관
const layoutContents = {};

function saveDynToMemory() {
  const inputs = {};
  document.querySelectorAll('#dyn input, #dyn textarea').forEach(el => {
    if (el.id) inputs[el.id] = el.type === 'checkbox' ? el.checked : el.value;
  });
  if (Object.keys(inputs).length > 0) layoutContents[curLayout] = inputs;
}

function restoreDynFromMemory(layout) {
  const saved = layoutContents[layout];
  if (!saved) return false;
  Object.entries(saved).forEach(([id, val]) => {
    const el = document.getElementById(id);
    if (!el) return;
    if (el.type === 'checkbox') el.checked = val;
    else el.value = val;
  });
  return true;
}

// ── 미리보기 스케일 (카드는 1080×1350, 뷰포트에 맞게 축소)
function updatePreviewScale() {
  const preview = document.querySelector('.preview');
  const availW = preview.clientWidth - 60;
  const availH = preview.clientHeight - 60;
  const scale = Math.min(availW / 1080, availH / 1350);
  const card = document.getElementById('card');
  const viewport = document.getElementById('card-viewport');
  card.style.transform = `scale(${scale})`;
  card.style.transformOrigin = 'top left';
  viewport.style.width = Math.round(1080 * scale) + 'px';
  viewport.style.height = Math.round(1350 * scale) + 'px';
}
window.addEventListener('resize', updatePreviewScale);

// ── 텍스트 마크업 (**강조**, ==하이라이트==)
function processText(raw) {
  return raw
    .replace(/\*\*(.*?)\*\*/g, '<span style="color:var(--point);font-weight:900;">$1</span>')
    .replace(/==(.*?)==/g, '<span style="background:var(--point);color:#111;padding:0 4px;border-radius:3px;font-weight:700;">$1</span>')
    .replace(/\n/g, '<br>');
}

function setBgFit(fit, btn) {
  bgFit = fit;
  document.querySelectorAll('#bg-fit-btns .align-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderCard();
}
function setSplitFit(fit, btn) {
  splitFit = fit;
  document.querySelectorAll('#split-fit-btns .align-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderCard();
}

function loadSplitPhoto(input) {
  if (!input.files || !input.files[0]) return;
  const reader = new FileReader();
  reader.onload = e => {
    splitPhotoData = e.target.result;
    const clr = document.getElementById('split-photo-clear');
    if (clr) clr.style.display = 'block';
    renderCard();
  };
  reader.readAsDataURL(input.files[0]);
}
function clearSplitPhoto() {
  splitPhotoData = null;
  const clr = document.getElementById('split-photo-clear');
  if (clr) clr.style.display = 'none';
  renderCard();
}

function loadLogo(input) {
  if (!input.files || !input.files[0]) return;
  const reader = new FileReader();
  reader.onload = e => {
    logoData = e.target.result;
    document.getElementById('logo-controls').style.display = 'flex';
    renderCard();
  };
  reader.readAsDataURL(input.files[0]);
}
function clearLogo() {
  logoData = null;
  document.getElementById('logo-controls').style.display = 'none';
  renderCard();
}
function setLogoPos(pos, btn) {
  curLogoPos = pos;
  document.querySelectorAll('#logo-pos-btns .align-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderCard();
}

function applyLogo() {
  const size = parseInt(document.getElementById('logo-size')?.value || 90);
  const op = parseInt(document.getElementById('logo-opacity')?.value || 80);
  document.getElementById('logo-size-val') && (document.getElementById('logo-size-val').textContent = size + 'px');
  document.getElementById('logo-op-val') && (document.getElementById('logo-op-val').textContent = op + '%');
  ['footer-logo-left','footer-logo-right','logo-topright'].forEach(id => {
    document.getElementById(id).style.display = 'none';
  });
  document.getElementById('footer-text-logo').style.display = 'block';
  if (!logoData) return;
  const style = `height:${size}px;object-fit:contain;opacity:${op/100};`;
  if (curLogoPos === 'footer-left') {
    document.getElementById('footer-text-logo').style.display = 'none';
    document.getElementById('footer-logo-left').style.display = 'block';
    document.getElementById('logo-footer-left-img').src = logoData;
    document.getElementById('logo-footer-left-img').style.cssText = style;
  } else if (curLogoPos === 'footer-right') {
    document.getElementById('footer-logo-right').style.display = 'block';
    document.getElementById('logo-footer-right-img').src = logoData;
    document.getElementById('logo-footer-right-img').style.cssText = style;
  } else if (curLogoPos === 'top-right') {
    document.getElementById('logo-topright').style.display = 'block';
    document.getElementById('logo-topright-img').src = logoData;
    document.getElementById('logo-topright-img').style.cssText = style;
  }
}

function applyColors() {
  const bg = document.getElementById('c-bg').value;
  const pt = document.getElementById('c-pt').value;
  const tm = document.getElementById('c-tm').value;
  const ts = document.getElementById('c-ts').value;
  const r = document.documentElement;
  r.style.setProperty('--card-bg', bg);
  r.style.setProperty('--point', pt);
  r.style.setProperty('--txt-main', tm);
  r.style.setProperty('--txt-sub', ts);
  document.getElementById('card').style.background = bg;
  renderCard();
}

function loadPhoto(input) {
  if (!input.files || !input.files[0]) return;
  const reader = new FileReader();
  reader.onload = e => {
    photoData = e.target.result;
    document.getElementById('photo-controls').style.display = 'flex';
    renderCard();
  };
  reader.readAsDataURL(input.files[0]);
}
function clearPhoto() {
  photoData = null;
  document.getElementById('photo-controls').style.display = 'none';
  renderCard();
}

function setLayout(type, btn) {
  saveDynToMemory();          // 현재 레이아웃 내용 메모리에 저장
  curLayout = type;
  document.querySelectorAll('.tmpl-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const alignShow = ['cover','quote','stat','checklist','beforeafter'].includes(type);
  document.getElementById('ctrl-align').style.display = alignShow ? 'flex' : 'none';
  document.getElementById('ctrl-cover-pos').style.display = type === 'cover' ? 'flex' : 'none';
  buildDynInputs();
  restoreDynFromMemory(type); // 돌아온 레이아웃 내용 복원
  renderCard();
}

function setAlign(a, btn) {
  curAlign = a;
  document.querySelectorAll('#align-btns .align-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderCard();
}

function buildDynInputs() {
  const dyn = document.getElementById('dyn');
  const t = curLayout;
  if (t === 'cover') {
    dyn.innerHTML = `
      <label>타이틀</label>
      <textarea id="in-title" rows="3" oninput="renderCard()">함께 만드는\n더 나은\n노동 세상</textarea>
      <label>설명</label>
      <textarea id="in-desc" rows="2" oninput="renderCard()">공공상생연대기금과 함께하는 변화의 이야기</textarea>
      <div class="toggle-row"><label>포인트 컬러 타이틀</label><label class="toggle"><input type="checkbox" id="cover-accent" onchange="renderCard()"><span class="toggle-slider"></span></label></div>
      <div class="toggle-row"><label>설명 숨기기</label><label class="toggle"><input type="checkbox" id="cover-nodesc" onchange="renderCard()"><span class="toggle-slider"></span></label></div>`;
  } else if (t === 'quote') {
    dyn.innerHTML = `
      <label>인용문</label>
      <textarea id="in-quote" rows="3" oninput="renderCard()">노동자가 주인인\n사회를 향해\n함께 걷습니다.</textarea>
      <label>출처 / 설명</label>
      <input type="text" id="in-source" value="— 노동사회연대 포럼 '솔라시' 중" oninput="renderCard()">`;
  } else if (t === 'list') {
    dyn.innerHTML = `
      <div class="slider-row"><label>항목 수</label><input type="range" id="list-count" min="2" max="4" value="3" oninput="buildListItems();renderCard()"><span class="slider-val" id="lc-val">3개</span></div>
      <div id="list-items"></div>`;
    buildListItems();
  } else if (t === 'checklist') {
    dyn.innerHTML = `
      <label>제목 (선택)</label>
      <input type="text" id="in-cl-title" value="파트너 지원사업 신청 준비" oninput="renderCard()">
      <div class="slider-row"><label>항목 수</label><input type="range" id="cl-count" min="2" max="5" value="4" oninput="buildClItems();renderCard()"><span class="slider-val" id="clc-val">4개</span></div>
      <div id="cl-items"></div>`;
    buildClItems();
  } else if (t === 'split') {
    dyn.innerHTML = `
      <label>사진 (이 레이아웃 전용)</label>
      <input type="file" accept="image/*" onchange="loadSplitPhoto(this)" style="color:#aaa;font-size:12px;">
      <div id="split-photo-clear" style="display:${splitPhotoData?'block':'none'};">
        <button onclick="clearSplitPhoto()" style="background:#1e1e1e;border:1px solid #333;color:#999;padding:5px 8px;border-radius:5px;cursor:pointer;font-size:11px;width:100%;">사진 제거</button>
      </div>
      <label>사진 맞춤</label>
      <div class="align-btns" id="split-fit-btns">
        <button class="align-btn ${splitFit==='cover'?'active':''}" onclick="setSplitFit('cover',this)">꽉 채움</button>
        <button class="align-btn ${splitFit==='contain'?'active':''}" onclick="setSplitFit('contain',this)">전체 보기</button>
        <button class="align-btn ${splitFit==='fill'?'active':''}" onclick="setSplitFit('fill',this)">늘리기</button>
      </div>
      <label>타이틀</label>
      <textarea id="in-title" rows="2" oninput="renderCard()">일터의 이야기를\n사진으로 담다</textarea>
      <label>설명</label>
      <textarea id="in-desc" rows="2" oninput="renderCard()">공공일터·노동자 사진공모전에서 만나는 현장의 목소리</textarea>
      <div class="slider-row"><label>사진 높이</label><input type="range" id="split-h" min="338" max="630" value="473" oninput="renderCard()"><span class="slider-val" id="sh-val">473px</span></div>`;
  } else if (t === 'qna') {
    dyn.innerHTML = `
      <label>질문 (Q)</label>
      <textarea id="in-q" rows="2" oninput="renderCard()">NPO 파트너 지원사업, 어떤 단체가 신청할 수 있나요?</textarea>
      <label>답변 (A)</label>
      <textarea id="in-a" rows="3" oninput="renderCard()">공익활동을 하는 비영리단체·사회적경제조직이라면 지원 가능합니다. 자세한 자격 요건은 공모 공고를 꼭 확인해 주세요.</textarea>`;
  } else if (t === 'stat') {
    dyn.innerHTML = `
      <label>숫자</label>
      <input type="text" id="in-num" value="100" oninput="renderCard()">
      <label>단위</label>
      <input type="text" id="in-unit" value="개+" oninput="renderCard()">
      <label>레이블 (숫자 아래)</label>
      <input type="text" id="in-stat-label" value="출연 공공기관" oninput="renderCard()">
      <label>설명</label>
      <textarea id="in-stat-desc" rows="2" oninput="renderCard()">함께 만들어가는 상생연대의 든든한 기반</textarea>`;
  } else if (t === 'timeline') {
    dyn.innerHTML = `
      <div class="slider-row"><label>항목 수</label><input type="range" id="tl-count" min="2" max="5" value="4" oninput="buildTlItems();renderCard()"><span class="slider-val" id="tlc-val">4개</span></div>
      <div id="tl-items"></div>`;
    buildTlItems();
  } else if (t === 'beforeafter') {
    dyn.innerHTML = `
      <label>상단 제목 (선택)</label>
      <input type="text" id="in-ba-title" value="무엇이 달라졌을까요?" oninput="renderCard()">
      <div style="border-top:1px solid #2a2a2a;margin:4px 0;"></div>
      <label style="color:#888;">▲ BEFORE</label>
      <input type="text" id="in-ba-blabel" value="BEFORE" oninput="renderCard()">
      <input type="text" id="in-ba-bval" value="연 12회" placeholder="수치 또는 핵심어" oninput="renderCard()">
      <input type="text" id="in-ba-bdesc" value="지원 프로그램 운영" placeholder="부연 설명" oninput="renderCard()">
      <div style="border-top:1px solid #2a2a2a;margin:4px 0;"></div>
      <label style="color:var(--point);">▼ AFTER</label>
      <input type="text" id="in-ba-alabel" value="AFTER" oninput="renderCard()">
      <input type="text" id="in-ba-aval" value="연 36회+" placeholder="수치 또는 핵심어" oninput="renderCard()">
      <input type="text" id="in-ba-adesc" value="참여 채널·지역 확대" placeholder="부연 설명" oninput="renderCard()">`;
  }
}

function buildListItems() {
  const count = parseInt(document.getElementById('list-count').value);
  document.getElementById('lc-val').textContent = count + '개';
  const defaults = [
    '공공영역 | 노동이사 교육사업·사진공모전으로 공공기관 현장을 지원합니다.',
    '상생영역 | 파트너 지원·상생대학으로 노동·시민사회와 함께합니다.',
    '연대영역 | 솔라시 포럼·소셜코리아로 연대의 장을 열어갑니다.',

  ];

function g(id) { const el = document.getElementById(id); return el ? el.value : ''; }
function gc(id) { const el = document.getElementById(id); return el ? el.checked : false; }

function renderCard() {
  const fs = parseInt(document.getElementById('font-size').value);
  document.getElementById('fs-val').textContent = fs + 'px';

  // 배경 사진
  const bgEl = document.getElementById('card-bg');
  const overlayEl = document.getElementById('card-overlay');
  if (photoData) {
    bgEl.src = photoData;
    bgEl.style.display = 'block';
    bgEl.style.objectFit = bgFit;
    const op = parseInt(document.getElementById('overlay-opacity').value);
    const blur = parseInt(document.getElementById('blur-range').value);
    document.getElementById('overlay-val').textContent = op + '%';
    document.getElementById('blur-val').textContent = blur + 'px';
    bgEl.style.filter = blur > 0 ? `blur(${blur}px)` : '';
    bgEl.style.transform = blur > 0 ? 'scale(1.04)' : '';
    overlayEl.style.display = 'block';
    overlayEl.style.background = `rgba(0,0,0,${op/100})`;
  } else {
    bgEl.style.display = 'none';
    overlayEl.style.display = 'none';
  }

  // 태그
  const tagEl = document.getElementById('card-tag');
  tagEl.textContent = g('in-tag');
  const tagColor = document.getElementById('c-tag').value;
  const tagBgHex = document.getElementById('c-tag-bg').value;
  const tr = parseInt(tagBgHex.slice(1,3),16);
  const tg = parseInt(tagBgHex.slice(3,5),16);
  const tb = parseInt(tagBgHex.slice(5,7),16);
  tagEl.style.cssText = `color:${tagColor};border:1px solid ${tagColor}40;background:rgba(${tr},${tg},${tb},0.18);`;

  const footerTextEl = document.getElementById('footer-text-logo');
  if (footerTextEl) footerTextEl.textContent = g('in-footer-text') || 'MY ORGANIZATION';

  const body = document.getElementById('card-body');
  const aStyle = `text-align:${curAlign};`;

  if (curLayout === 'cover') {
    const title = processText(g('in-title'));
    const desc = processText(g('in-desc'));
    const accent = gc('cover-accent');
    const nodesc = gc('cover-nodesc');
    const posVal = parseInt(document.getElementById('cover-pos')?.value ?? 100);
    const justifyMap = posVal <= 20 ? 'flex-start' : posVal <= 60 ? 'center' : 'flex-end';
    const posLabel = posVal <= 20 ? '위' : posVal <= 60 ? '중앙' : '아래';
    document.getElementById('cover-pos-val') && (document.getElementById('cover-pos-val').textContent = posLabel);
    body.innerHTML = `<div class="lay-cover" style="${aStyle}justify-content:${justifyMap};">
      <div class="c-title" style="font-size:${fs}px;${accent?'color:var(--point)':''}">${title}</div>
      ${!nodesc ? `<div class="c-desc" style="font-size:${Math.max(fs*0.42,32)}px;">${desc}</div>` : ''}
    </div>`;

  } else if (curLayout === 'quote') {
    const q = processText(g('in-quote'));
    const src = g('in-source');
    const c = curAlign === 'center';
    body.innerHTML = `<div class="lay-quote" style="${aStyle}">
      <div class="q-mark" style="${c?'text-align:center;padding:0;border:none;':''}">"</div>
      <div class="q-text" style="font-size:${fs}px;${c?'text-align:center;border:none;padding:0;':''}">${q}</div>
      ${src ? `<div class="q-source" style="${c?'text-align:center;padding:0;':''}">${src}</div>` : ''}
    </div>`;

  } else if (curLayout === 'list') {
    const count = parseInt(document.getElementById('list-count')?.value || 3);
    let items = '';
    for (let i = 0; i < count; i++) {
      const val = g('li-' + i).split('|');
      const t = processText((val[0] || '').trim());
      const d = processText((val[1] || '').trim());
      items += `<div class="l-card">
        <div class="l-num">0${i+1}</div>
        <div class="l-body" style="font-size:${Math.max(fs*0.38,29)}px;">
          ${t ? `<b style="font-size:${Math.max(fs*0.42,32)}px;">${t}</b>` : ''}
          ${d}
        </div>
      </div>`;
    }
    body.innerHTML = `<div class="lay-list">${items}</div>`;

  } else if (curLayout === 'checklist') {
    const count = parseInt(document.getElementById('cl-count')?.value || 4);
    const clTitle = g('in-cl-title');
    let items = '';
    for (let i = 0; i < count; i++) {
      const isChecked = document.getElementById(`cl-chk-${i}`)?.checked || false;
      const text = processText(g(`cl-${i}`));
      items += `<div class="cl-item">
        <div class="cl-icon ${isChecked ? 'done' : ''}">${isChecked ? '✓' : ''}</div>
        <div class="cl-text ${isChecked ? 'done-text' : ''}" style="font-size:${Math.max(fs*0.38,29)}px;">${text}</div>
      </div>`;
    }
    body.innerHTML = `<div class="lay-checklist" style="${aStyle}">
      ${clTitle ? `<div class="cl-section-title" style="font-size:${Math.max(fs*0.48,36)}px;">${processText(clTitle)}</div>` : ''}
      ${items}
    </div>`;

  } else if (curLayout === 'split') {
    const title = processText(g('in-title'));
    const desc = processText(g('in-desc'));
    const sh = parseInt(document.getElementById('split-h')?.value || 473);
    document.getElementById('sh-val') && (document.getElementById('sh-val').textContent = sh + 'px');
    const bgSizeMap = { cover: 'cover', contain: 'contain', fill: '100% 100%' };
    const bgSize = bgSizeMap[splitFit] || 'cover';
    const imgHtml = splitPhotoData
      ? `<div style="width:100%;height:${sh}px;background-image:url('${splitPhotoData}');background-size:${bgSize};background-repeat:no-repeat;background-position:center;"></div>`
      : `<div class="split-img-placeholder" style="height:${sh}px;">사진을 업로드하세요</div>`;
    body.innerHTML = `<div class="lay-split">
      <div class="split-img-box" style="height:${sh}px;">${imgHtml}</div>
      <div class="c-title" style="font-size:${Math.min(fs,77)}px;">${title}</div>
      <div class="c-desc" style="font-size:${Math.max(fs*0.38,29)}px;">${desc}</div>
    </div>`;

  } else if (curLayout === 'qna') {
    const q = processText(g('in-q'));
    const a = processText(g('in-a'));
    body.innerHTML = `<div class="lay-qna">
      <div class="qna-q">
        <div class="qna-badge" style="font-size:${Math.max(fs*0.45,36)}px;">Q.</div>
        <div class="qna-q-text" style="font-size:${Math.max(fs*0.45,36)}px;">${q}</div>
      </div>
      <div class="qna-divider"></div>
      <div class="qna-a">
        <div class="qna-a-badge" style="font-size:${Math.max(fs*0.45,36)}px;">A.</div>
        <div class="qna-a-text" style="font-size:${Math.max(fs*0.38,29)}px;">${a}</div>
      </div>
    </div>`;

  } else if (curLayout === 'stat') {
    const num = g('in-num');
    const unit = g('in-unit');
    const lbl = g('in-stat-label');
    const desc = processText(g('in-stat-desc'));
    body.innerHTML = `<div class="lay-stat" style="${aStyle}">
      <div class="stat-num" style="font-size:${fs*2.2}px;">${num}<span class="stat-unit" style="font-size:${fs*0.55}px;">${unit}</span></div>
      <div class="stat-label" style="font-size:${fs*0.48}px;">${lbl}</div>
      <div class="stat-desc" style="font-size:${Math.max(fs*0.36,27)}px;">${desc}</div>
    </div>`;

  } else if (curLayout === 'timeline') {
    const count = parseInt(document.getElementById('tl-count')?.value || 4);
    let items = '';
    for (let i = 0; i < count; i++) {
      const y = g('tl-y-' + i);
      const t = processText(g('tl-t-' + i));
      const d = processText(g('tl-d-' + i));
      items += `<div class="tl-item">
        <div class="tl-dot-wrap"><div class="tl-dot${i===0?' first':''}"></div></div>
        <div class="tl-body">
          ${y ? `<div class="tl-year" style="font-size:${Math.max(fs*0.3,25)}px;">${y}</div>` : ''}
          <div class="tl-title" style="font-size:${Math.max(fs*0.38,29)}px;">${t}</div>
          ${d ? `<div class="tl-desc" style="font-size:${Math.max(fs*0.3,25)}px;">${d}</div>` : ''}
        </div>
      </div>`;
    }
    body.innerHTML = `<div class="lay-timeline"><div class="tl-line"></div>${items}</div>`;

  } else if (curLayout === 'beforeafter') {
    const baTitle = processText(g('in-ba-title'));
    const bLabel = g('in-ba-blabel') || 'BEFORE';
    const bVal   = processText(g('in-ba-bval'));
    const bDesc  = processText(g('in-ba-bdesc'));
    const aLabel = g('in-ba-alabel') || 'AFTER';
    const aVal   = processText(g('in-ba-aval'));
    const aDesc  = processText(g('in-ba-adesc'));
    body.innerHTML = `<div class="lay-ba" style="${aStyle}">
      ${baTitle ? `<div class="ba-title" style="font-size:${Math.min(fs,77)}px;">${baTitle}</div>` : ''}
      <div class="ba-panel before">
        <div class="ba-label">${bLabel}</div>
        <div class="ba-val" style="font-size:${fs*1.4}px;">${bVal}</div>
        ${bDesc ? `<div class="ba-desc" style="font-size:${Math.max(fs*0.38,29)}px;">${bDesc}</div>` : ''}
      </div>
      <div class="ba-arrow">↓</div>
      <div class="ba-panel after">
        <div class="ba-label">${aLabel}</div>
        <div class="ba-val" style="font-size:${fs*1.4}px;">${aVal}</div>
        ${aDesc ? `<div class="ba-desc" style="font-size:${Math.max(fs*0.38,29)}px;">${aDesc}</div>` : ''}
      </div>
    </div>`;
  }

  applyLogo();
}

// ── 저장 (카드가 이미 1080×1350이므로 scale:1로 네이티브 캡처)
function saveImage() {
  const card = document.getElementById('card');
  const origTransform = card.style.transform;
  const origOrigin = card.style.transformOrigin;
  // 스케일 제거 후 캡처
  card.style.transform = 'none';
  card.style.transformOrigin = 'top left';
  html2canvas(card, {
    scale: 1,
    width: 1080,
    height: 1350,
    useCORS: true,
    allowTaint: true,
    logging: false
  }).then(canvas => {
    card.style.transform = origTransform;
    card.style.transformOrigin = origOrigin;
    const a = document.createElement('a');
    a.download = `cardnews_${curLayout}.png`;
    a.href = canvas.toDataURL('image/png');
    a.click();
  });
}

async function saveZip() {
  const btn = document.getElementById('zip-btn');
  btn.disabled = true;
  btn.textContent = '⏳ 생성 중...';
  // 현재 카드 저장
  cards[curCardIdx] = getCardState();
  const card = document.getElementById('card');
  const origTransform = card.style.transform;
  const origOrigin = card.style.transformOrigin;
  card.style.transform = 'none';
  card.style.transformOrigin = 'top left';
  const zip = new JSZip();
  for (let i = 0; i < cards.length; i++) {
    btn.textContent = `⏳ ${i+1} / ${cards.length} 장 처리 중...`;
    applyCardState(cards[i]);
    await new Promise(r => setTimeout(r, 120)); // 렌더 대기
    const canvas = await html2canvas(card, { scale:1, width:1080, height:1350, useCORS:true, allowTaint:true, logging:false });
    const blob = await new Promise(r => canvas.toBlob(r, 'image/png'));
    zip.file(`card_${String(i+1).padStart(2,'0')}.png`, blob);
  }
  // 원래 카드로 복원
  applyCardState(cards[curCardIdx]);
  card.style.transform = origTransform;
  card.style.transformOrigin = origOrigin;
  const content = await zip.generateAsync({ type: 'blob' });
  const a = document.createElement('a');
  a.download = `cardnews_${cards.length}장.zip`;
  a.href = URL.createObjectURL(content);
  a.click();
  btn.disabled = false;
  btn.innerHTML = `📦 전체 ZIP 저장 (<span id="zip-card-count">${cards.length}</span>장)`;
}

// ── localStorage 자동저장
const SAVE_KEY = 'cardnews_state_v5';
let saveTimer = null;

function saveState() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    try {
      // 현재 카드 스냅샷 갱신
      cards[curCardIdx] = getCardState();
      const state = {
        cards,
        curCardIdx,
      };
      localStorage.setItem(SAVE_KEY, JSON.stringify(state));
      const ind = document.getElementById('save-indicator');
      if (ind) { ind.textContent = '✓ 자동저장됨'; setTimeout(() => { ind.textContent = ''; }, 2000); }
    } catch(e) {}
  }, 600);
}

function loadState() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return;
    const s = JSON.parse(raw);
    if (!s.cards || !s.cards.length) return;
    cards = s.cards;
    curCardIdx = s.curCardIdx || 0;
    applyCardState(cards[curCardIdx]);
    updateSlideStrip();
    const ind = document.getElementById('save-indicator');
    if (ind) { ind.textContent = '↩ 이전 작업 복원됨'; setTimeout(() => { ind.textContent = ''; }, 3000); }
  } catch(e) {}
}

const EMOJI_DATA = {
  '기호·표시': ['✅','❌','⚠️','➡️','⬅️','⬆️','⬇️','🔴','🟡','🟢','🔵','🟣','⚫','⚪','🔶','🔷','📌','📍','🔖','💬','💭','🗣️','📢','📣'],
  '활동·사람': ['🤝','👥','💪','🙌','👋','🏃','🎯','🏆','🥇','🎤','🎉','🎊','✨','🌟','⭐','💡','🔥','⚡','🌱','🌿','🌍'],
  '문서·숫자': ['📋','📊','📈','📉','📝','📖','📚','🔍','🔎','💰','🏢','📅','🕐','🗓️','🔗','⚙️','🛠️','📦','🗂️'],
  '숫자·기호': ['1️⃣','2️⃣','3️⃣','4️⃣','5️⃣','①','②','③','④','⑤','▶','◀','●','■','▲','◆','▷','◁','○','□'],
};
const EMOJI_CATS = Object.keys(EMOJI_DATA);
let emojiTargetId = null;
let emojiCurCat = EMOJI_CATS[0];

function buildEmojiPicker() {
  const catsEl = document.getElementById('emoji-cats');
  const gridEl = document.getElementById('emoji-grid');
  catsEl.innerHTML = EMOJI_CATS.map(c =>
    `<button class="emoji-cat-btn${c===emojiCurCat?' active':''}" onclick="switchEmojiCat(event,'${c}')">${c}</button>`
  ).join('');
  gridEl.innerHTML = EMOJI_DATA[emojiCurCat].map(e =>
    `<button class="emoji-item" onclick="insertEmoji(event,'${e}')" title="${e}">${e}</button>`
  ).join('');
}

function switchEmojiCat(e, cat) {
  e.stopPropagation();  // 피커 닫힘 방지
  emojiCurCat = cat;
  buildEmojiPicker();
}

function toggleEmoji(e, targetId) {
  e.stopPropagation();
  const picker = document.getElementById('emoji-picker');
  const isOpen = picker.classList.contains('show');
  if (isOpen && emojiTargetId === targetId) { picker.classList.remove('show'); return; }
  emojiTargetId = targetId;
  // 커서 포커스된 입력창 자동 감지
  if (!targetId) {
    const active = document.activeElement;
    if (active && (active.tagName === 'INPUT' || active.tagName === 'TEXTAREA') && active.id) {
      emojiTargetId = active.id;
    }
  }
  buildEmojiPicker();
  // 위치: 버튼 기준
  const btn = e.currentTarget;
  const rect = btn.getBoundingClientRect();
  picker.style.top = (rect.bottom + 6) + 'px';
  picker.style.left = Math.min(rect.left, window.innerWidth - 280) + 'px';
  picker.classList.add('show');
}

function insertEmoji(e, emoji) {
  e.stopPropagation();  // 피커 닫힘 방지
  const el = emojiTargetId ? document.getElementById(emojiTargetId) : document.activeElement;
  if (!el || (el.tagName !== 'INPUT' && el.tagName !== 'TEXTAREA')) return;
  const s = el.selectionStart ?? el.value.length;
  const e2 = el.selectionEnd ?? el.value.length;
  el.value = el.value.slice(0, s) + emoji + el.value.slice(e2);
  el.selectionStart = el.selectionEnd = s + emoji.length;
  el.dispatchEvent(new Event('input'));
  el.focus();
}

// 피커 외부 클릭 시 닫기
document.addEventListener('click', e => {
  const picker = document.getElementById('emoji-picker');
  if (!picker.contains(e.target) && !e.target.closest('.emoji-btn')) {
    picker.classList.remove('show');
  }
});

loadState();

// ★ 동적 입력창 전체에 위임 이벤트 — 레이아웃 전환 후 새로 생긴 입력도 자동 캡처
document.getElementById('dyn').addEventListener('input', saveState);
document.getElementById('dyn').addEventListener('change', saveState);
</script>
